<app-message-box *ngIf="loginError || loginSuccess" [showSuccess]="loginSuccess"
  [showError]="loginError"></app-message-box>
<div class="login-page" dir="rtl">
  <div class="login-card">
    <!-- Card Header -->
    <div class="login-header">
      <svg class="login-icon" width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="rgba(255,255,255,0.08)" />
        <rect x="16" y="18" width="16" height="14" rx="3" stroke="#fff" stroke-width="2" fill="none" />
        <path d="M20 18v-3a4 4 0 018 0v3" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none" />
        <circle cx="24" cy="26" r="2" fill="#fff" />
        <line x1="24" y1="28" x2="24" y2="30" stroke="#fff" stroke-width="2" stroke-linecap="round" />
      </svg>
      <h4>تسجيل دخول</h4>
      <p>ادخل بياناتك للوصول إلى حسابك</p>
    </div>

    <!-- Form -->
    <div class="login-body">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <!-- Email -->
        <div class="form-field">
          <label class="form-label">البريد الالكتروني</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af"
              stroke-width="2" stroke-linecap="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            <input type="text" formControlName="email" placeholder="ادخل بريدك الالكتروني" />
          </div>
        </div>

        <!-- Password -->
        <div class="form-field">
          <label class="form-label">كلمه السر</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af"
              stroke-width="2" stroke-linecap="round">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0110 0v4" />
            </svg>
            <input type="password" formControlName="password" placeholder="ادخل كلمه السر" />
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4" />
            <polyline points="10 17 15 12 10 7" />
            <line x1="15" y1="12" x2="3" y2="12" />
          </svg>
          تسجيل
        </button>

      </form>
    </div>
  </div>
</div>
