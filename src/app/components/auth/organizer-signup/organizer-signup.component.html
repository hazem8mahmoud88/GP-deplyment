<app-message-box *ngIf="signupError || signupSuccess" [showSuccess]="signupSuccess"
  [showError]="signupError"></app-message-box>
<div class="signup-page" dir="rtl">
  <div class="signup-card">
    <!-- Card Header -->
    <div class="signup-header">
      <svg class="signup-icon" width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="rgba(255,255,255,0.08)" />
        <circle cx="20" cy="18" r="5" stroke="#fff" stroke-width="2" fill="none" />
        <path d="M12 36c0-4.418 3.582-8 8-8h0c4.418 0 8 3.582 8 8" stroke="#fff" stroke-width="2" stroke-linecap="round"
          fill="none" />
        <line x1="32" y1="22" x2="32" y2="30" stroke="#fff" stroke-width="2.5" stroke-linecap="round" />
        <line x1="36" y1="26" x2="28" y2="26" stroke="#fff" stroke-width="2.5" stroke-linecap="round" />
      </svg>
      <h4>تسجيل منظم</h4>
      <p>ادخل بيانات المنظم الجديد</p>
    </div>

    <!-- Form -->
    <div class="signup-body">
      <form [formGroup]="OrgSignupForm" (ngSubmit)="onSubmit()">

        <!-- Email -->
        <div class="form-field">
          <label class="form-label">البريد الالكتروني</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af"
              stroke-width="2" stroke-linecap="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            <input type="text" formControlName="email" placeholder="ادخل بريدك الالكتروني" />
          </div>
        </div>

        <!-- Username -->
        <div class="form-field">
          <label class="form-label">اسم المستخدم</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af"
              stroke-width="2" stroke-linecap="round">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4-4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input type="text" formControlName="username" placeholder="ادخل اسم المستخدم" />
          </div>
        </div>

        <!-- Password -->
        <div class="form-field">
          <label class="form-label">كلمه السر</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af"
              stroke-width="2" stroke-linecap="round">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0110 0v4" />
            </svg>
            <input type="password" formControlName="password" placeholder="ادخل كلمه السر" />
          </div>
        </div>

        <!-- Full Name -->
        <div class="form-field">
          <label class="form-label">اسم المستخدم كامل</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af"
              stroke-width="2" stroke-linecap="round">
              <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
              <rect x="8" y="2" width="8" height="4" rx="1" />
              <line x1="12" y1="11" x2="12" y2="17" />
              <line x1="9" y1="14" x2="15" y2="14" />
            </svg>
            <input type="text" formControlName="fullname" placeholder="ادخل اسم المنظم كاملا" />
          </div>
        </div>

        <!-- Organization Name -->
        <div class="form-field">
          <label class="form-label">اسم المنظمه</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af"
              stroke-width="2" stroke-linecap="round">
              <path d="M3 21h18" />
              <path d="M5 21V7l8-4v18" />
              <path d="M19 21V11l-6-4" />
              <path d="M9 9v.01" />
              <path d="M9 12v.01" />
              <path d="M9 15v.01" />
              <path d="M9 18v.01" />
            </svg>
            <input type="text" formControlName="orgName" placeholder="ادخل اسم المنظمه" />
          </div>
        </div>

        <!-- Phone number -->
        <div class="form-field">
          <label class="form-label">رقم الهاتف</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af"
              stroke-width="2" stroke-linecap="round">
              <path
                d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />
            </svg>
            <input type="text" formControlName="phoneNumber" placeholder="ادخل رقم الهاتف" />
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" [disabled]="OrgSignupForm.invalid" class="submit-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round">
            <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" y1="8" x2="19" y2="14" />
            <line x1="22" y1="11" x2="16" y2="11" />
          </svg>
          تسجيل
        </button>

      </form>
    </div>
  </div>
</div>
