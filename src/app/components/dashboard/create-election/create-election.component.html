<app-message-box [showSuccess]="successMessage" [showError]="errorMessage"></app-message-box>
<div class="container">
  <div class="overlay active">
    <div class="floating-form">

      <!-- Header -->
      <div class="modal-header-custom">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
          stroke-linecap="round">
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
          <line x1="12" y1="14" x2="12" y2="18" />
          <line x1="10" y1="16" x2="14" y2="16" />
        </svg>
        <h4>إنشاء انتخاب</h4>
        <button class="close-btn" (click)="close()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>

      <!-- Main Form -->
      <div class="modal-body-custom">
        <form dir="rtl" [formGroup]="candidatesForm" (ngSubmit)="onSubmit()">

          <div class="form-field">
            <label class="form-label">العنوان</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af"
                stroke-width="2" stroke-linecap="round">
                <path d="M4 7V4h16v3" />
                <path d="M9 20h6" />
                <path d="M12 4v16" />
              </svg>
              <input type="text" formControlName="title" placeholder="أدخل عنوان الانتخاب">
            </div>
          </div>

          <div class="form-field">
            <label class="form-label">النوع</label>
            <div class="select-wrapper">
              <select class="custom-select" formControlName="type">
                <option disabled [ngValue]="''">أختر النوع</option>
                <option [ngValue]="'رئاسي'">رئاسي</option>
                <option [ngValue]="'نقابي'">نقابي</option>
                <option [ngValue]="'برلماني'">برلماني</option>
                <option [ngValue]="'أخري'">أخري</option>
              </select>
              <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999"
                stroke-width="2">
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </div>
          </div>

          <div class="form-field">
            <label class="form-label">الوصف</label>
            <textarea class="custom-textarea" formControlName="description" rows="3"
              placeholder="أدخل وصف الانتخاب"></textarea>
          </div>

          <!-- Dates -->
          <div class="dates-row">
            <div class="form-field">
              <label class="form-label">تاريخ البدء</label>
              <input type="date" formControlName="startDate" class="custom-input">
            </div>

            <div class="form-field">
              <label class="form-label">تاريخ الانتهاء</label>
              <input type="date" formControlName="endDate" class="custom-input">
            </div>
          </div>

          <div class="form-divider"></div>

          <button type="submit" class="submit-btn" [disabled]="candidatesForm.invalid">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round">
              <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
              <polyline points="17 21 17 13 7 13 7 21" />
              <polyline points="7 3 7 8 15 8" />
            </svg>
            حفظ الانتخاب
          </button>
        </form>
      </div>

    </div>
  </div>
</div>
