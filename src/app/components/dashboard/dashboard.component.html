<div class="main-container container">
  <div class="dashboard-header">
    <div class="dashboard-title">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#224abe" stroke-width="2"
        stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7" rx="1" />
        <rect x="14" y="3" width="7" height="7" rx="1" />
        <rect x="3" y="14" width="7" height="7" rx="1" />
        <rect x="14" y="14" width="7" height="7" rx="1" />
      </svg>
      <h2>لوحة التحكم</h2>
    </div>
    <button class="create-btn" *ngIf="user?.role === 'Admin'" (click)="closeElectionScreen = true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
      انشاء انتخابات جديده
    </button>
  </div>
  <app-create-election (closeElectionScreen)="closeElectionScreenFn()"
    *ngIf="closeElectionScreen"></app-create-election>
</div>
<app-election></app-election>
