<app-message-box *ngIf="successMessage || errorMessage" [showError]="errorMessage" [showSuccess]="successMessage"></app-message-box>

<div class="container fade-in">
  <!-- Header Section -->
  <div class="header">
    <div class="header-content">
      <svg class="header-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="20" r="9" stroke="white" stroke-width="2.5" fill="rgba(255,255,255,0.15)"/>
        <path d="M6 48c0-8.837 7.163-16 16-16h0c8.837 0 16 7.163 16 16" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <circle cx="44" cy="22" r="7" stroke="rgba(255,255,255,0.7)" stroke-width="2" fill="rgba(255,255,255,0.1)"/>
        <path d="M34 48c0-6.627 4.477-12 10-12s10 5.373 10 12" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
      <h3>{{electionDetails.title}}</h3>
      <p class="header-subtitle">إدارة المنظمين</p>
    </div>
    <!-- Decorative floating dots -->
    <div class="header-decoration">
      <span class="dot dot-1"></span>
      <span class="dot dot-2"></span>
      <span class="dot dot-3"></span>
    </div>
  </div>

  <div class="organizers-container">
    <!-- Add Organizer Form Card -->
    <div class="form-card">
      <div class="form-card-header">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#224abe" stroke-width="2" stroke-linecap="round">
          <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
        <span>إضافة منظم جديد</span>
      </div>
      <div class="form-card-body">
        <form *ngIf="isDesktop ? formActive : true" [formGroup]="organizerForm" (ngSubmit)="onSubmit()" class="organizer-form">
          <div class="select-wrapper">
            <select class="organizer-selection" formControlName="id">
              <option [ngValue]="null" selected disabled>أختر منظم</option>
              <option *ngFor="let organizer of allOrganizers" [ngValue]="organizer.id ? organizer.id : 'أختر منظم'">
                Email: {{organizer.email}} | {{organizer.fullName}}
              </option>
            </select>
            <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </form>
        <button
          [disabled]="!isDesktop ? organizerForm.invalid : formActive ? organizerForm.invalid : false"
          [type]="formActive ? 'submit' : 'button'"
          (click)="formActive ? onSubmit() : activateForm()"
          class="add-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span>إضافة</span>
        </button>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider">
      <span class="divider-label">المنظمين الحاليين</span>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="organizers.length < 1">
      <svg class="empty-svg" viewBox="0 0 120 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="30" width="80" height="50" rx="8" stroke="#d0d5dd" stroke-width="2" fill="#f9fafb"/>
        <circle cx="60" cy="25" r="12" stroke="#d0d5dd" stroke-width="2" fill="#f2f4f7"/>
        <path d="M48 25h24" stroke="#e4e7ec" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M40 50h40" stroke="#e4e7ec" stroke-width="2" stroke-linecap="round"/>
        <path d="M45 60h30" stroke="#e4e7ec" stroke-width="2" stroke-linecap="round"/>
        <path d="M50 70h20" stroke="#e4e7ec" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <p class="empty-text">لا يوجد منظمين حالياً</p>
      <p class="empty-subtext">أضف منظمين للانتخابات من القائمة أعلاه</p>
    </div>

    <!-- Organizers List -->
    <div class="organizers-list" *ngIf="organizers.length >= 1">
      <div class="organizer-card" *ngFor="let organizer of organizers; let i = index" [style.animation-delay]="i * 0.08 + 's'">
        <div class="organizer-info">
          <div class="organizer-avatar">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#224abe" stroke-width="2" stroke-linecap="round">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4-4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="organizer-details">
            <span class="organizer-name">{{organizer.organizerName}}</span>
            <span class="organizer-id">ID: {{organizer.organizerId}}</span>
          </div>
        </div>
        <button class="delete-btn" (click)="deleteOrganizer(organizer.organizerId)" title="حذف المنظم">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6"/>
            <path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
