<app-message-box [showSuccess]="successMessage" [showError]="errorMessage"></app-message-box>

<div class="container flex-row d-flex">
  <div class="sidebar">
    <ul class="list-group h-100">
      <li (click)="setSection('add-organizer')" [class.active]="activeSection === 'add-organizer'"
        class="list-group-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2" />
          <circle cx="9" cy="7" r="4" />
          <line x1="19" y1="8" x2="19" y2="14" />
          <line x1="22" y1="11" x2="16" y2="11" />
        </svg>
        <span>اضافه منظم</span>
      </li>
      <li (click)="setSection('edit-election')" [class.active]="activeSection === 'edit-election'"
        class="list-group-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
        <span>تعديل الانتخابات</span>
      </li>
      <button class="activate-election-btn" (click)="activateElection()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3" />
        </svg>
        <span>تفعيل</span>
      </button>
      <button class="close-election-btn" (click)="closeElection()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0110 0v4" />
        </svg>
        <span>اغلاق</span>
      </button>
      <button class="delete-election-btn" (click)="deleteElection()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
          <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2" />
        </svg>
        <span>حذف</span>
      </button>
    </ul>
  </div>
  <div class="w-100">
    <app-add-organizers *ngIf="activeSection === 'add-organizer' "></app-add-organizers>
    <app-edit-election *ngIf="activeSection === 'edit-election' "></app-edit-election>
  </div>
</div>
