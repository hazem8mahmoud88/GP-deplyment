<app-message-box [showSuccess]="successMessage" [showError]="errorMessage"></app-message-box>
<div class="container main-container fade-in">
  <!-- Header -->
  <div class="page-header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#224abe" stroke-width="2"
      stroke-linecap="round">
      <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2" />
      <circle cx="9" cy="7" r="4" />
      <line x1="19" y1="8" x2="19" y2="14" />
      <line x1="22" y1="11" x2="16" y2="11" />
    </svg>
    <span>إدارة المرشحين</span>
  </div>

  <button class="add-candidate-btn" data-bs-toggle="modal" data-bs-target="#candidateModal">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19" />
      <line x1="5" y1="12" x2="19" y2="12" />
    </svg>
    إضافة مرشح
  </button>

  <div class="divider"><span class="divider-label">المرشحين الحاليين</span></div>

  <div class="candidates-container">
    <!-- Empty State -->
    <div class="empty-state" *ngIf="candidates.length < 1">
      <svg class="empty-svg" viewBox="0 0 120 100" fill="none">
        <rect x="20" y="25" width="80" height="55" rx="10" stroke="#d0d5dd" stroke-width="2" fill="#f9fafb" />
        <circle cx="60" cy="45" r="10" stroke="#d0d5dd" stroke-width="2" fill="#f2f4f7" />
        <path d="M45 68h30" stroke="#e4e7ec" stroke-width="2" stroke-linecap="round" />
      </svg>
      <p>لا يوجد مرشحين</p>
    </div>

    <!-- Candidates List -->
    <div class="candidates-list" *ngIf="candidates.length >= 1">
      <div class="candidate-card" *ngFor="let candidate of candidates; let i = index"
        [style.animation-delay]="i * 0.08 + 's'">
        <!-- Image -->
        <label class="avatar-upload">
          <img [src]="candidate.photoPath" (error)="avatarImageError($event)">
          <input type="file" accept="image/*" (change)="imageSelected($event, candidate.id)" hidden>
          <div class="avatar-overlay">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
              stroke-linecap="round">
              <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" />
              <circle cx="12" cy="13" r="4" />
            </svg>
          </div>
        </label>

        <div class="candidate-info">
          <span class="candidate-name">{{candidate.fullName}}</span>
          <span class="candidate-symbol">{{candidate.symbol}}</span>
        </div>
        <div class="candidate-actions">
          <button class="delete-btn" (click)="deleteCandidate(candidate.id)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round">
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
              <path d="M10 11v6" />
              <path d="M14 11v6" />
              <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="candidateModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content custom-modal">
        <div class="modal-header-custom">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
            stroke-linecap="round">
            <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" y1="8" x2="19" y2="14" />
            <line x1="22" y1="11" x2="16" y2="11" />
          </svg>
          <h5 class="modal-title">اضافه مرشح</h5>
          <button type="button" class="close-btn" data-bs-dismiss="modal">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal-body-custom">
          <form [formGroup]="candidatesForm" (ngSubmit)="onSubmit()">
            <div class="form-field">
              <label class="form-label">الاسم كامل</label>
              <input type="text" class="custom-input" formControlName="fullName" />
            </div>
            <div class="form-field">
              <label class="form-label">رمز المرشح</label>
              <input type="text" class="custom-input" formControlName="symbol" />
            </div>
            <div class="form-field">
              <label class="form-label">اسم الحزب</label>
              <input type="text" class="custom-input" formControlName="partyName" />
            </div>
            <div class="form-field">
              <label class="form-label">رقم المرشح</label>
              <input type="text" class="custom-input" formControlName="candidateNum" />
            </div>
            <button [disabled]="candidatesForm.invalid" type="submit" class="submit-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              اضافه
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
