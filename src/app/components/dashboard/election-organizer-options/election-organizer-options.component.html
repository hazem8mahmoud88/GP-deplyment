<app-message-box [showSuccess]="successMessage" [showError]="errorMessage"></app-message-box>
<div class="container flex-row d-flex">
  <div class="sidebar">
    <ul class="list-group h-100">
      <li (click)="setSection('upload-data')" [class.active]="activeSection === 'upload-data'" class="list-group-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
        <span>رفع الملفات</span>
      </li>
      <li (click)="setSection('add-candidates')" [class.active]="activeSection === 'add-candidates'"
        class="list-group-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2" />
          <circle cx="9" cy="7" r="4" />
          <line x1="19" y1="8" x2="19" y2="14" />
          <line x1="22" y1="11" x2="16" y2="11" />
        </svg>
        <span>اضافه مرشحين</span>
      </li>
      <!-- Count Votes button -->
      <button class="count-votes-btn" (click)="countVotes()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10" />
          <line x1="12" y1="20" x2="12" y2="4" />
          <line x1="6" y1="20" x2="6" y2="14" />
        </svg>
        <span>حساب الاصوات</span>
      </button>
    </ul>
  </div>
  <div class="w-100">
    <app-file-upload *ngIf="activeSection === 'upload-data'"></app-file-upload>
    <app-add-candidates *ngIf="activeSection === 'add-candidates'"></app-add-candidates>
  </div>
</div>
