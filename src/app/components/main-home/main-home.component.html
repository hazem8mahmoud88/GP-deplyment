<div class="home-section" dir="rtl">
  <!-- Decorative elements -->
  <div class="hero-decoration">
    <span class="hero-dot hero-dot-1"></span>
    <span class="hero-dot hero-dot-2"></span>
    <span class="hero-dot hero-dot-3"></span>
    <span class="hero-dot hero-dot-4"></span>
  </div>

  <div class="container d-flex flex-row-reverse home-content align-items-center">

    <!-- Left Picture -->
    <div class="left-picture d-flex col-sm-12 col-md-6 mb-4 mb-lg-0 col-lg-5">
      <img style="margin-right: auto" src="../../../assets/home-imgs/Security 1.png" class="img-fluid hero-image"
        alt="Security Illustration">
    </div>

    <!-- Right Text -->
    <div class="right-text d-flex justify-content-center col-sm-12 col-md-6 flex-column me-lg-4 col-lg-7">
      <div class="hero-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
        تصويت آمن ومشفر
      </div>
      <div class="text mb-3">
        <h1 class="fw-bold">SecureVote</h1>
        <p class="lead">منصة التصويت الإلكتروني الآمنة — تشفير متقدم، تحقق بيومتري، وضمان كامل لسرية صوتك.</p>
      </div>
      <div class="hero-features">
        <div class="hero-feature-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="20 6 9 17 4 12" />
          </svg>
          <span>تشفير AES-256 + RSA-2048</span>
        </div>
        <div class="hero-feature-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="20 6 9 17 4 12" />
          </svg>
          <span>تحقق بالتعرف على الوجه</span>
        </div>
        <div class="hero-feature-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="20 6 9 17 4 12" />
          </svg>
          <span>سرية تامة بعد الفرز</span>
        </div>
      </div>
    </div>

  </div>
</div>
<app-election [home]="true"></app-election>
